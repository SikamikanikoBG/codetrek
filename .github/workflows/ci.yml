name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run unit tests
        run: npx vitest run

  docker-smoke-test:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t codetrek:ci .

      - name: Boot container
        run: docker run -d --name codetrek-ci -p 8090:80 codetrek:ci

      - name: Wait for health check (curl loop)
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8090/ >/dev/null; then
              echo "App is up."
              exit 0
            fi
            echo "Waiting for app to respond ($i)..."
            sleep 2
          done
          echo "App did not become healthy in time."
          docker logs codetrek-ci
          exit 1

      - name: Clean up
        if: always()
        run: docker rm -f codetrek-ci || true
