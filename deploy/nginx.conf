server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — any unmatched path serves index.html so client-side
    # routing (and hard refreshes on a deep link) both work.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets are content-hashed by Vite — safe to cache aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Optional cross-device profile sync backend (issue #1) — reverse
    # proxied so the frontend can call same-origin /api/... with no CORS
    # setup and no separately-exposed backend port. `codetrek-api` resolves
    # via Docker Compose's built-in DNS (both services share one network).
    # No trailing path on proxy_pass: the matched /api/... prefix is passed
    # through UNCHANGED, matching the backend's own /api/... routes.
    location /api/ {
        proxy_pass http://codetrek-api:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
}
