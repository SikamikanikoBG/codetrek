server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — any unmatched path serves index.html so client-side
    # routing (and hard refreshes on a deep link) both work.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets are content-hashed by Vite — safe to cache aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Optional cross-device profile sync backend (issue #1) — reverse
    # proxied so the frontend can call same-origin /api/... with no CORS
    # setup and no separately-exposed backend port. `codetrek-api` resolves
    # via Docker Compose's built-in DNS (both services share one network).
    # No trailing path on proxy_pass: the matched /api/... prefix is passed
    # through UNCHANGED, matching the backend's own /api/... routes.
    #
    # IMPORTANT: proxy_pass to a bare hostname resolves it at CONFIG-LOAD
    # time — if codetrek-api isn't reachable yet (standalone frontend
    # container, e.g. this repo's own docker-smoke-test CI job which boots
    # only the frontend image, or a degraded deploy), nginx refuses to
    # start AT ALL and the whole frontend container crash-loops, not just
    # /api/ calls. (This is exactly what broke production briefly on 2026
    # -07-05.) Using a variable + `resolver` defers DNS lookup to request
    # time via Docker's embedded DNS (127.0.0.11), so a missing/unreachable
    # backend degrades to a 502 on /api/ calls only — the rest of the app
    # (gameplay, localStorage-only mode) keeps working regardless.
    resolver 127.0.0.11 valid=10s;
    location /api/ {
        set $codetrek_api codetrek-api:4000;
        proxy_pass http://$codetrek_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_intercept_errors on;
        error_page 502 503 504 = @api_unavailable;
    }

    location @api_unavailable {
        default_type application/json;
        return 503 '{"error":"sync backend unavailable"}';
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
}
